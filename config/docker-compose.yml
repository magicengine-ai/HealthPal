version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: healthpal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: healthpal_root
      MYSQL_DATABASE: healthpal
      MYSQL_USER: healthpal
      MYSQL_PASSWORD: healthpal_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthpal-net

  mongodb:
    image: mongo:6
    container_name: healthpal-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: healthpal
      MONGO_INITDB_ROOT_PASSWORD: healthpal_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - healthpal-net

  redis:
    image: redis:7-alpine
    container_name: healthpal-redis
    ports:
      - "6379:6379"
    networks:
      - healthpal-net

  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - mongodb
      - redis
    environment:
      - ENV=development
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=healthpal
      - MYSQL_PASSWORD=healthpal_pass
      - MYSQL_DATABASE=healthpal
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=healthpal
      - MONGO_PASSWORD=healthpal_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=healthpal-dev-secret-key-change-in-production
    volumes:
      - ../src/backend:/app
      - ./uploads:/app/uploads
    networks:
      - healthpal-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
  mongo_data:

networks:
  healthpal-net:
    driver: bridge

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: healthpal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: healthpal_root
      MYSQL_DATABASE: healthpal
      MYSQL_USER: healthpal
      MYSQL_PASSWORD: healthpal_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthpal-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:6
    container_name: healthpal-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: healthpal
      MONGO_INITDB_ROOT_PASSWORD: healthpal_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - healthpal-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: healthpal-redis
    ports:
      - "6379:6379"
    networks:
      - healthpal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-backend
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENV=development
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=healthpal
      - MYSQL_PASSWORD=healthpal_pass
      - MYSQL_DATABASE=healthpal
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=healthpal
      - MONGO_PASSWORD=healthpal_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=healthpal-dev-secret-key-change-in-production
    volumes:
      - ../src/backend:/app
      - ./uploads:/app/uploads
    networks:
      - healthpal-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-celery-worker
    depends_on:
      - redis
      - mysql
      - mongodb
    environment:
      - ENV=development
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=healthpal
      - MYSQL_PASSWORD=healthpal_pass
      - MYSQL_DATABASE=healthpal
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=healthpal
      - MONGO_PASSWORD=healthpal_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../src/backend:/app
      - ./uploads:/app/uploads
    networks:
      - healthpal-net
    command: celery -A app.core.celery_config.celery_app worker -Q ocr_queue,notification_queue,analysis_queue,default -l info -c 4
    restart: unless-stopped

  # Celery Beat (定时任务调度器)
  celery_beat:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-celery-beat
    depends_on:
      - redis
    environment:
      - ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../src/backend:/app
      - celery_beat_data:/app/logs
    networks:
      - healthpal-net
    command: celery -A app.core.celery_config.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    restart: unless-stopped

  # Flower (Celery 监控面板)
  flower:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-flower
    depends_on:
      - redis
      - celery_worker
    ports:
      - "5555:5555"
    environment:
      - ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - healthpal-net
    command: celery -A app.core.celery_config.celery_app flower --port=5555 --broker=redis://redis:6379/0 --persistent=True
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  celery_beat_data:

networks:
  healthpal-net:
    driver: bridge

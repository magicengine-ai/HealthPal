version: '3.8'

services:
  # Redis - 已本地安装，这里只为后端提供容器内访问
  redis:
    image: redis:7-alpine
    container_name: healthpal-redis
    ports:
      - "6379:6379"
    networks:
      - healthpal-net
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: healthpal-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - ENV=development
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=healthpal
      - MONGO_HOST=host.docker.internal
      - MONGO_PORT=27017
      - MONGO_USER=
      - MONGO_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=healthpal-dev-secret-key
    volumes:
      - ../src/backend:/app
    networks:
      - healthpal-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:

networks:
  healthpal-net:
    driver: bridge

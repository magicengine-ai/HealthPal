name: healthpal
description: HealthPal - 个人健康档案 AI 助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 本地化
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1

  # 状态管理
  provider: ^6.1.1
  # riverpod: ^2.4.9

  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  connectivity_plus: ^5.0.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # 图片处理
  image_picker: ^1.0.5
  image_cropper: ^5.0.1
  cached_network_image: ^3.3.0

  # 图表
  fl_chart: ^0.65.0
  charts_flutter: ^0.12.0

  # 推送通知
  flutter_local_notifications: ^16.3.0

  # 权限
  permission_handler: ^11.1.0

  # 路由
  go_router: ^12.1.1

  # UI 组件
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0

  # 工具
  logger: ^2.0.2+1
  equatable: ^2.0.5
  dartz: ^0.10.1

  # 安全存储
  flutter_secure_storage: ^9.0.0

  # 文件处理
  file_picker: ^6.1.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: PingFang
      fonts:
        - asset: assets/fonts/PingFang-Regular.ttf
        - asset: assets/fonts/PingFang-Medium.ttf
          weight: 500
        - asset: assets/fonts/PingFang-Bold.ttf
          weight: 700
